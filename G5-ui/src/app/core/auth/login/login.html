<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500&display=swap');

  .ms-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background: #0d0d0d;
  }
  .ms-card {
    width: 100%;
    max-width: 400px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    position: relative;
    overflow: hidden;
  }
  .ms-accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #FACC15; }
  .ms-corner-mark { position: absolute; bottom: -1px; right: -1px; width: 56px; height: 56px; border-top: 2px solid #FACC15; border-left: 2px solid #FACC15; border-radius: 0 0 0 8px; opacity: 0.35; }
  .ms-logo-block { text-align: center; margin-bottom: 2rem; }
  .ms-logo-eyebrow { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.25em; color: #6b7280; text-transform: uppercase; margin: 0 0 4px; }
  .ms-logo-title { font-family: 'Oswald', sans-serif; font-size: 42px; font-weight: 700; color: #FACC15; letter-spacing: 0.08em; line-height: 1; margin: 0; }
  .ms-divider-logo { display: flex; align-items: center; gap: 8px; margin: 10px auto 0; width: fit-content; }
  .ms-divider-logo span { display: block; width: 20px; height: 1px; background: #FACC15; opacity: 0.5; }
  .ms-rhombus { width: 6px; height: 6px; background: #FACC15; transform: rotate(45deg); opacity: 0.8; }
  .ms-logo-sub { font-family: 'Inter', sans-serif; font-size: 12px; color: #6b7280; margin: 8px 0 0; letter-spacing: 0.04em; }
  .ms-label { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.12em; color: #FACC15; text-transform: uppercase; display: block; margin-bottom: 8px; }
  .ms-field { margin-bottom: 1.25rem; }
  .ms-input-wrap { position: relative; }
  .ms-input-wrap .ms-icon-left { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #4b5563; font-size: 16px; pointer-events: none; }
  .ms-input-wrap .ms-icon-right { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #4b5563; font-size: 16px; cursor: pointer; background: none; border: none; padding: 0; display: flex; align-items: center; transition: color 0.2s; }
  .ms-input-wrap .ms-icon-right:hover { color: #FACC15; }
  .ms-input { width: 100%; box-sizing: border-box; padding: 12px 40px 12px 40px; background: #111111; border: 1px solid #2d2d2d; border-radius: 8px; color: #f3f4f6; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .ms-input:focus { border-color: #FACC15; }
  .ms-input::placeholder { color: #4b5563; }
  .ms-btn-primary { width: 100%; padding: 13px; background: #FACC15; color: #0d0d0d; font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 0.5rem; }
  .ms-btn-primary:hover:not(:disabled) { background: #fde047; }
  .ms-btn-primary:active:not(:disabled) { transform: scale(0.99); }
  .ms-btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .ms-error { color: #f87171; font-family: 'Inter', sans-serif; font-size: 13px; text-align: center; margin-top: 1rem; }
  .ms-sep { display: flex; align-items: center; gap: 12px; margin: 1.5rem 0 1rem; }
  .ms-sep-line { flex: 1; height: 1px; background: #2a2a2a; }
  .ms-sep-text { font-family: 'Inter', sans-serif; font-size: 11px; color: #4b5563; letter-spacing: 0.08em; text-transform: uppercase; }
  .ms-register-block { text-align: center; }
  .ms-register-hint { font-family: 'Inter', sans-serif; font-size: 12px; color: #4b5563; margin: 0 0 6px; }
  .ms-btn-register { background: none; border: none; cursor: pointer; font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #FACC15; padding: 0; transition: opacity 0.2s; }
  .ms-btn-register:hover { opacity: 0.75; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .ti-loader-2 { animation: spin 0.8s linear infinite; }
</style>

<div class="ms-wrap">
  <div class="ms-card">

    <div class="ms-accent-bar"></div>
    <div class="ms-corner-mark"></div>

    <div class="ms-logo-block">
      <p class="ms-logo-eyebrow">Bienvenido de vuelta</p>
      <h1 class="ms-logo-title">MOTOSX</h1>
      <div class="ms-divider-logo">
        <span></span>
        <div class="ms-rhombus"></div>
        <span></span>
      </div>
      <p class="ms-logo-sub">Inicia sesión para continuar</p>
    </div>

    <div class="ms-field">
      <label class="ms-label">Correo electrónico</label>
      <div class="ms-input-wrap">
        <i class="ti ti-mail ms-icon-left" aria-hidden="true"></i>
        <input
          [(ngModel)]="email"
          type="email"
          placeholder="ejemplo@email.com"
          class="ms-input">
      </div>
    </div>

    <div class="ms-field">
      <label class="ms-label">Contraseña</label>
      <div class="ms-input-wrap">
        <i class="ti ti-lock ms-icon-left" aria-hidden="true"></i>
        <input
          [(ngModel)]="contrasenia"
          [type]="mostrarPassword ? 'text' : 'password'"
          placeholder="••••••••"
          class="ms-input">
        <button
          type="button"
          class="ms-icon-right"
          (click)="mostrarPassword = !mostrarPassword"
          [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
          <i [class]="mostrarPassword ? 'ti ti-eye-off' : 'ti ti-eye'"></i>
        </button>
      </div>
    </div>

    <button (click)="login()" class="ms-btn-primary" [disabled]="cargando">
      <i [class]="cargando ? 'ti ti-loader-2 ti-spin' : 'ti ti-arrow-right'" aria-hidden="true"></i>
      {{ cargando ? 'Ingresando...' : 'Ingresar' }}
    </button>

    <p *ngIf="error" class="ms-error">{{ error }}</p>
    
    <p *ngIf="mensajeExito" class="ms-success" style="color: #2ec4b6; font-weight: 600; text-align: center; margin-top: 10px;">
      <i class="ti ti-circle-check"></i> {{ mensajeExito }}
    </p>

    <div class="ms-sep">
      <div class="ms-sep-line"></div>
      <span class="ms-sep-text">o</span>
      <div class="ms-sep-line"></div>
    </div>

    <div class="ms-register-block">
      <p class="ms-register-hint">¿No tienes cuenta?</p>
      <button (click)="irARegistro.emit()" class="ms-btn-register">
        Registrar
      </button>
    </div>

  </div>
</div>
